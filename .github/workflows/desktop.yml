name: Desktop installers

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy migrations into desktop app
        run: node apps/desktop/scripts/copy-migrations.js

      - name: Build desktop app
        run: pnpm --filter=desktop build

      - name: Build installers (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm --filter=desktop exec electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installers (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm --filter=desktop exec electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Unsigned; user may need to right-click → Open once

      - name: Build installers (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter=desktop exec electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: apps/desktop/dist/

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: apps/desktop/dist/

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: apps/desktop/dist/
