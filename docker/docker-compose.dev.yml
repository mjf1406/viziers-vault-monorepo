services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: viziers
      POSTGRES_PASSWORD: viziers
      POSTGRES_DB: viziers_vault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viziers -d viziers_vault"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
