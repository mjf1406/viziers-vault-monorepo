# Run with pre-built images from GitHub Container Registry (no local build).
# Set GITHUB_REPOSITORY to your org/repo, e.g.:
#   export GITHUB_REPOSITORY=your-org/viziers-vault-monorepo
# Then: docker compose -f docker-compose.ci.yml --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-viziers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-viziers}
      POSTGRES_DB: ${POSTGRES_DB:-viziers_vault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viziers} -d ${POSTGRES_DB:-viziers_vault}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-owner/repo}/api:latest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-viziers}:${POSTGRES_PASSWORD:-viziers}@postgres:5432/${POSTGRES_DB:-viziers_vault}
      DEPLOYMENT_MODE: self-host
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_BASE_URL: ${BETTER_AUTH_BASE_URL:-http://localhost}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-owner/repo}/web:latest
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
