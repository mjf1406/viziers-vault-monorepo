services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-viziers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-viziers}
      POSTGRES_DB: ${POSTGRES_DB:-viziers_vault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viziers} -d ${POSTGRES_DB:-viziers_vault}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-viziers}:${POSTGRES_PASSWORD:-viziers}@postgres:5432/${POSTGRES_DB:-viziers_vault}
      DEPLOYMENT_MODE: self-host
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_BASE_URL: ${BETTER_AUTH_BASE_URL:-http://localhost}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../apps/web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
