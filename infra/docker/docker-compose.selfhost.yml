# Self-host / LAN deployment scaffold.
# Placeholder: replace image/build paths and env when adding production Dockerfiles.
# Electron is not part of Docker; desktop app is a separate distribution.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-viziers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-viziers_vault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viziers}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    # TODO: build from apps/server when Dockerfile exists
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'Replace with server start command'"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-viziers}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-viziers_vault}
    depends_on:
      postgres:
        condition: service_healthy
    # ports: ["3001:3001"]  # or expose only via reverse proxy

  web:
    # TODO: build from apps/web when Dockerfile exists
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'Replace with web start command'"
    # ports: ["3000:3000"]
    # depends_on: [server]

  # Optional: reverse proxy (uncomment when Caddyfile is used)
  # caddy:
  #   image: caddy:2-alpine
  #   ports: ["80:80", "443:443"]
  #   volumes: ["./Caddyfile:/etc/caddy/Caddyfile"]
  #   depends_on: [web, server]

volumes:
  postgres_data: {}
