services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: viziers
      POSTGRES_PASSWORD: viziers
      POSTGRES_DB: viziers_vault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viziers -d viziers_vault"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      DATABASE_URL: postgres://viziers:viziers@postgres:5432/viziers_vault
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
